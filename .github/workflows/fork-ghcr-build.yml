---
name: Build fork image to GHCR

# Builds the fork as ghcr.io/<owner>/audiobookshelf:<tag> using only the
# built-in GITHUB_TOKEN. No DockerHub, no extra secrets.
#
# This is a fork-only helper; the upstream docker-build.yml is intentionally
# left untouched.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. ios-hls, ios-hls-v1)'
        required: true
        default: 'ios-hls'
  push:
    branches:
      - 'ios-hls*'
      - 'claude/**'
    paths:
      - client/**
      - server/**
      - index.js
      - package.json
      - Dockerfile
      - .github/workflows/fork-ghcr-build.yml

jobs:
  build:
    if: ${{ github.repository != 'advplyr/audiobookshelf' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            branch=${GITHUB_REF_NAME//\//-}
            echo "value=${branch}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.value }}/audiobookshelf:${{ steps.tag.outputs.value }}
